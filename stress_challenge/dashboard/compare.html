<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaHeal — Baseline vs Controlled Comparison</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e0e0f0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8888aa;
            margin-top: 5px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(100, 100, 200, 0.15);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8888aa;
            margin-bottom: 8px;
        }

        .summary-card .values {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .summary-card .val {
            font-size: 1.4em;
            font-weight: 700;
        }

        .summary-card .val small {
            font-size: 0.5em;
            display: block;
            font-weight: 400;
            color: #8888aa;
        }

        .val.baseline {
            color: #ef4444;
        }

        .val.controlled {
            color: #22c55e;
        }

        .val.better {
            color: #22c55e;
        }

        .val.worse {
            color: #ef4444;
        }

        .verdict-banner {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.1em;
        }

        .verdict-banner.bad {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(100, 100, 200, 0.15);
            border-radius: 12px;
            padding: 16px;
        }

        .chart-card h3 {
            font-size: 0.9em;
            color: #aaaacc;
            margin-bottom: 10px;
        }

        .chart-card canvas {
            width: 100% !important;
            height: 250px !important;
        }

        .chart-card.wide {
            grid-column: 1 / -1;
        }

        .legend-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2em;
            color: #8888aa;
        }

        .no-data {
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🛡️ GigaHeal — Performance Comparison</h1>
        <p>Baseline (uncontrolled) vs Adaptive Controller</p>
    </div>

    <div class="legend-row">
        <div class="legend-item">
            <div class="legend-dot" style="background:#ef4444"></div>
            <span>Baseline (no controller)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#22c55e"></div>
            <span>Controlled (GigaHeal active)</span>
        </div>
    </div>

    <div id="verdictBanner" class="verdict-banner" style="display:none"></div>

    <div id="summaryGrid" class="summary-grid"></div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3>🌡️ CPU Temperature (°C)</h3><canvas id="chartTemp"></canvas>
        </div>
        <div class="chart-card">
            <h3>⚡ CPU GFLOPS</h3><canvas id="chartGflops"></canvas>
        </div>
        <div class="chart-card">
            <h3>🔥 GPU Power (W)</h3><canvas id="chartPower"></canvas>
        </div>
        <div class="chart-card">
            <h3>📊 GPU TFLOPS</h3><canvas id="chartTflops"></canvas>
        </div>
        <div class="chart-card wide">
            <h3>🔧 Controller Actions (Workers + Sleep)</h3><canvas id="chartController"></canvas>
        </div>
    </div>

    <div id="loadingMsg" class="loading">Loading comparison data...</div>

    <script>
        const BASELINE_COLOR = '#ef4444';
        const CONTROLLED_COLOR = '#22c55e';

        async function loadData() {
            try {
                const res = await fetch('/api/compare');
                const data = await res.json();
                if (data.error) {
                    document.getElementById('loadingMsg').innerHTML = `<span class="no-data">⚠️ ${data.error}</span>`;
                    return;
                }
                document.getElementById('loadingMsg').style.display = 'none';
                renderAll(data);
            } catch (e) {
                document.getElementById('loadingMsg').innerHTML = `<span class="no-data">⚠️ Failed to load: ${e.message}</span>`;
            }
        }

        function renderAll(data) {
            const b = data.baseline;
            const c = data.controlled;

            // Summary cards
            renderSummary(data.summary);

            // Verdict
            renderVerdict(data.summary);

            // Charts
            makeOverlayChart('chartTemp', b.elapsed, b.cpu_temp, c.elapsed, c.cpu_temp, '°C', 30);
            makeOverlayChart('chartGflops', b.elapsed, b.cpu_gflops, c.elapsed, c.cpu_gflops, 'GFLOPS', 0);
            makeOverlayChart('chartPower', b.elapsed, b.gpu_power, c.elapsed, c.gpu_power, 'W', 0);
            makeOverlayChart('chartTflops', b.elapsed, b.gpu_tflops, c.elapsed, c.gpu_tflops, 'TFLOPS', 0);

            // Controller chart (only controlled has data)
            if (data.controller && data.controller.elapsed.length > 0) {
                makeControllerChart(data.controller);
            }
        }

        function renderSummary(s) {
            const grid = document.getElementById('summaryGrid');
            const cards = [
                { label: 'Avg CPU GFLOPS', bVal: s.b_avg_gflops, cVal: s.c_avg_gflops, unit: '', higherBetter: true },
                { label: 'GFLOPS CoV', bVal: s.b_cov_gflops, cVal: s.c_cov_gflops, unit: '%', higherBetter: false },
                { label: 'Peak CPU Temp', bVal: s.b_peak_temp, cVal: s.c_peak_temp, unit: '°C', higherBetter: false },
                { label: 'Avg CPU Temp', bVal: s.b_avg_temp, cVal: s.c_avg_temp, unit: '°C', higherBetter: false },
                { label: 'Degradation', bVal: s.b_degradation, cVal: s.c_degradation, unit: '%', higherBetter: false },
                { label: 'Avg GPU TFLOPS', bVal: s.b_avg_tflops, cVal: s.c_avg_tflops, unit: '', higherBetter: true },
            ];

            grid.innerHTML = cards.map(c => {
                const bBetter = c.higherBetter ? c.bVal > c.cVal : c.bVal < c.cVal;
                return `<div class="summary-card">
                <div class="label">${c.label}</div>
                <div class="values">
                    <div class="val baseline">${fmtNum(c.bVal)}${c.unit}<small>Baseline</small></div>
                    <div class="val controlled">${fmtNum(c.cVal)}${c.unit}<small>Controlled</small></div>
                </div>
            </div>`;
            }).join('');
        }

        function renderVerdict(s) {
            const banner = document.getElementById('verdictBanner');
            const covImprove = ((s.b_cov_gflops - s.c_cov_gflops) / Math.max(s.b_cov_gflops, 0.01) * 100).toFixed(0);
            const tempDrop = (s.b_peak_temp - s.c_peak_temp).toFixed(1);
            const degradDiff = (s.b_degradation - s.c_degradation).toFixed(1);

            if (s.c_cov_gflops < s.b_cov_gflops) {
                banner.className = 'verdict-banner';
                banner.innerHTML = `✅ <strong>GigaHeal improved consistency by ${covImprove}%</strong> — CoV dropped from ${s.b_cov_gflops.toFixed(1)}% to ${s.c_cov_gflops.toFixed(1)}% | Peak temp reduced by ${tempDrop}°C | Degradation reduced by ${degradDiff}%`;
            } else {
                banner.className = 'verdict-banner bad';
                banner.innerHTML = `⚠️ Controller did not improve consistency in this run. Thresholds may need further tuning.`;
            }
            banner.style.display = 'block';
        }

        function fmtNum(v) {
            if (v === undefined || v === null) return '--';
            return v < 10 ? v.toFixed(2) : v.toFixed(1);
        }

        function makeOverlayChart(canvasId, bX, bY, cX, cY, unit, suggestedMin) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Baseline',
                            data: bX.map((x, i) => ({ x, y: bY[i] })),
                            borderColor: BASELINE_COLOR,
                            backgroundColor: 'rgba(239,68,68,0.05)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: true,
                        },
                        {
                            label: 'Controlled',
                            data: cX.map((x, i) => ({ x, y: cY[i] })),
                            borderColor: CONTROLLED_COLOR,
                            backgroundColor: 'rgba(34,197,94,0.05)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: true,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Elapsed (s)', color: '#666' },
                            ticks: { color: '#666' },
                            grid: { color: 'rgba(100,100,200,0.08)' },
                        },
                        y: {
                            title: { display: true, text: unit, color: '#666' },
                            ticks: { color: '#666' },
                            grid: { color: 'rgba(100,100,200,0.08)' },
                            suggestedMin,
                        }
                    },
                    plugins: {
                        legend: { display: false },
                    }
                }
            });
        }

        function makeControllerChart(ctrl) {
            const ctx = document.getElementById('chartController').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Active Workers',
                            data: ctrl.elapsed.map((x, i) => ({ x, y: ctrl.workers[i] })),
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                        },
                        {
                            label: 'Sleep (ms)',
                            data: ctrl.elapsed.map((x, i) => ({ x, y: ctrl.sleep_ms[i] })),
                            borderColor: '#f59e0b',
                            borderWidth: 2,
                            borderDash: [4, 4],
                            pointRadius: 0,
                            yAxisID: 'y1',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: {
                            type: 'linear',
                            title: { display: true, text: 'Elapsed (s)', color: '#666' },
                            ticks: { color: '#666' },
                            grid: { color: 'rgba(100,100,200,0.08)' },
                        },
                        y: {
                            position: 'left',
                            title: { display: true, text: 'Workers', color: '#3b82f6' },
                            ticks: { color: '#3b82f6' },
                            grid: { color: 'rgba(100,100,200,0.08)' },
                            suggestedMin: 0,
                        },
                        y1: {
                            position: 'right',
                            title: { display: true, text: 'Sleep (ms)', color: '#f59e0b' },
                            ticks: { color: '#f59e0b' },
                            grid: { drawOnChartArea: false },
                            suggestedMin: 0,
                        }
                    },
                    plugins: {
                        legend: { display: true, position: 'top', labels: { color: '#aaa' } },
                    }
                }
            });
        }

        loadData();
    </script>
</body>

</html>
